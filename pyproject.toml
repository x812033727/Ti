[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ti-studio"
version = "0.1.0"
description = "AI 專家討論工作室 — 多智能體自主軟體開發 studio (Claude Agent SDK)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "claude-agent-sdk>=0.1.0",
    "fastapi>=0.110",
    # 鎖定 uvicorn>=0.30 以強化 ProxyHeaders 信任鏈、避免 X-Forwarded-For 取最左值偽造 client IP。
    # 注意：版本鎖僅為基線，實際防護需部署端設定 forwarded_allow_ips 為 proxy 私網範圍、嚴禁 "*"。
    "uvicorn[standard]>=0.30,<0.36",
    "python-dotenv>=1.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "pre-commit>=3.7",
]
openai = [
    "openai>=1.30",
]

[tool.setuptools]
packages = ["studio"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# E/F：pycodestyle + pyflakes；I：import 排序；UP：pyupgrade；B：bugbear。
select = ["E", "F", "I", "UP", "B"]
# 行長由 formatter 處理，放寬個別過長行（多為中文註解）。
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
