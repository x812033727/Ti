name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # 測試不需 claude-agent-sdk（orchestrator 延後 import），僅裝測試實際用到的依賴，
        # 讓 CI 快速且不受 SDK 打包差異影響。
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" httpx python-dotenv pytest pytest-asyncio pytest-cov

      - name: Configure git (for workspace git tests)
        run: |
          git config --global user.email ci@ti.local
          git config --global user.name "CI"

      - name: Run tests
        # 用 python -m pytest，確保 repo 根目錄在 sys.path 上，studio 套件可被 import。
        # CI runner 無法執行 bubblewrap（Ubuntu 24.04 限制 unprivileged user/net
        # namespace，--unshare-net 會 "loopback: RTM_NEWADDR Operation not permitted"），
        # 故用官方逃生口 TI_SANDBOX=0 關閉沙箱。沙箱只是執行外層包裝，run_command 的
        # 行為與測試覆蓋不變；正式環境預設 TI_SANDBOX=1 仍開啟。
        env:
          TI_SANDBOX: "0"
        run: python -m pytest -q --cov=studio --cov-report=term-missing
