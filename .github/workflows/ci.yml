name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # 測試不需 claude-agent-sdk（orchestrator 延後 import），僅裝測試實際用到的依賴，
        # 讓 CI 快速且不受 SDK 打包差異影響。
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" httpx python-dotenv pytest pytest-asyncio

      - name: Configure git (for workspace git tests)
        run: |
          git config --global user.email ci@ti.local
          git config --global user.name "CI"

      - name: Run tests
        run: pytest -q
