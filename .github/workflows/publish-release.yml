name: Publish release

# 觸發：push tag v*。本 workflow 建立 GitHub release（published 狀態）。
#
# 觸發死結（任務 #3 核心）：以 GITHUB_TOKEN 建立的 release 不會啟動下游 workflow
# （GitHub 防遞迴機制），release-smoke.yml 的 `on: release: published` 將永不觸發，
# 形同未啟用。解法＝改以 PAT（secrets.GH_PAT）身分建立 release，PAT 產生的
# release:published 事件即可正常觸發下游 release-smoke，無需改動 smoke workflow。
#
# GH_PAT 最小權限（資安要求）：請用 Fine-grained PAT，僅授予「本 repo」的
# `Contents: Read and write`（建立 release 所需的唯一 scope）。
# classic PAT 請僅勾 `repo`（已是最小可用集）。切勿使用 admin:org、repo:all
# 等過大 scope——PAT 一旦洩漏，爆炸半徑與授予 scope 等大。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # gh release create 的最小權限需求

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 防卡死燒額度（同 ci.yml / release-smoke.yml 註記）
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Step 1 — PAT guard：把「GH_PAT 未設」攔在最前面。
      # 注意：`test -n` 只能偵測「未設（空字串）」，無法驗證 PAT 是否過期/被撤銷——
      # 過期 PAT 仍會通過此 guard，到 Create release 才以 403 失敗。此 guard 的價值
      # 在於把最常見的「忘了設 secret」攔在第一步，CI log 直接指向根因，而非到 Step 5 才撞權限問題。
      - name: Verify PAT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          test -n "$GH_TOKEN" || { echo "::error::GH_PAT secret 未設；GITHUB_TOKEN 建立的 release 不會觸發下游 release-smoke，必須以 PAT 建立"; exit 1; }

      # Step 2 — 版本字串以 pyproject.toml 為單一事實來源，不在 YAML 硬寫版本號。
      - name: Resolve version (SSOT = pyproject.toml)
        id: version
        run: |
          ver=$(python -c 'from studio.release_note import pyproject_version; print(pyproject_version())')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
          echo "resolved version: $ver"

      # Step 3 — 斷言 push 的 tag 與程式碼版本一致；不符即 fail-fast，不建立 release。
      # tag 與版本不同步是上線事故根因，最便宜的攔截點在 release 建立前。
      - name: Assert tag matches version
        env:
          EXPECTED: v${{ steps.version.outputs.version }}
          ACTUAL: ${{ github.ref_name }}
        run: |
          test "$ACTUAL" = "$EXPECTED" || { echo "::error::push 的 tag '$ACTUAL' 與 pyproject 版本 '$EXPECTED' 不符，拒絕建立 release"; exit 1; }

      # Step 4 — 渲染 release body 至 body.md。body 來源＝studio.release_note.render_tag_notes
      # （讀真實 CHANGELOG.md + pyproject_version()），不在 YAML 重寫任何 heading 字面值。
      - name: Render release body
        run: python scripts/publish_release.py

      # Step 5 — 以 PAT 建立 published release（不帶 --draft，狀態直接為 published 才能被
      # release-smoke 的 release:published 接住）。body 經 -F body.md 注入，不經 shell 字串拼裝。
      # GH_TOKEN=secrets.GH_PAT 是解除觸發死結的關鍵：PAT 身分建立的 release 才會觸發下游。
      #
      # 資安（防 GitHub Actions script injection）：tag 透過 env TAG 傳入、在 run 內以 "$TAG"
      # 引用，不在 run 字串內直接展開 `${{ ... }}`。後者會在 shell 執行「前」展開，雙引號擋不住
      # 注入；若版本字串含 `;`、`$(...)`、換行（惡意 PR／供應鏈），可在持有 PAT 的 runner 執行任意指令。
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "$TAG" -F body.md
