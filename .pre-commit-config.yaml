# 提交前自動跑 lint 與格式化。安裝：pip install -e ".[dev]" && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4  # 與 pyproject [dev] 的 ruff==0.14.4 同步，避免本地/CI/pre-commit 三端版本分歧
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # shell 用法掃描（warning-only，不阻斷 commit）。
  # 與 CI 共用同一支腳本 scripts/scan_shell_usage.sh（SSOT），規則/args 天然一致。
  # warn 模式由腳本恆回 0 保證不擋 commit；升級 blocking 改 SCAN_MODE=block 即可。
  - repo: local
    hooks:
      - id: scan-shell-usage
        name: scan shell usage (warning-only)
        entry: bash scripts/scan_shell_usage.sh
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

  # 裸 pytest 掃描（blocking）。與 CI 共用同一支腳本 scripts/scan_bare_pytest.sh（SSOT）。
  # 只掃 docs/（files 限定 + pass_filenames），命中裸 `pytest tests/` 即讓檔案失敗。
  # SCAN_MODE 預設 block 由腳本內收斂；升級/降級單處改 SCAN_MODE 即可。
  - repo: local
    hooks:
      - id: no-bare-pytest
        name: 禁止文件出現裸 pytest 指令
        entry: bash scripts/scan_bare_pytest.sh
        language: system
        files: ^docs/
        types: [markdown]
        pass_filenames: true
        verbose: true
