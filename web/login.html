<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>登入 — Ti Studio</title>
  <!-- 防 FOUC：在樣式載入前套用主題初值（與 index.html 同一段） -->
  <script>try{var t=localStorage.getItem("ti-theme");if(t==="light"||((!t||t==="system")&&matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.dataset.theme="light";}catch(e){}</script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236e79ff'/%3E%3Cstop offset='.55' stop-color='%23a78bfa'/%3E%3Cstop offset='1' stop-color='%23c084fc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='24' height='24' rx='7' fill='url(%23g)'/%3E%3Cpath d='M7.5 9.2h11M13 9.2v8.4' stroke='%23fff' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <svg class="logo" width="30" height="30" viewBox="0 0 26 26" aria-hidden="true">
        <defs>
          <linearGradient id="lg-login" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6e79ff"/>
            <stop offset=".55" stop-color="#a78bfa"/>
            <stop offset="1" stop-color="#c084fc"/>
          </linearGradient>
        </defs>
        <rect x="1" y="1" width="24" height="24" rx="7" fill="url(#lg-login)"/>
        <path d="M7.5 9.2h11M13 9.2v8.4" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      Ti Studio
    </div>
    <div class="login-sub">AI 專家討論工作室</div>
    <form id="loginForm" class="login-form">
      <input id="password" type="password" placeholder="請輸入存取密碼" autocomplete="current-password" autofocus />
      <button id="loginBtn" type="submit">登入</button>
      <div id="loginError" class="login-error hidden"></div>
    </form>
  </div>
  <script src="/static/login.js"></script>
</body>
</html>
