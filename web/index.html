<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ti Studio — AI 專家討論工作室</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🛠️ <span>Ti Studio</span> <small>AI 專家討論工作室</small>
      <span id="offlineBadge" class="badge-offline hidden">離線示範</span>
    </div>
    <div class="launch">
      <input id="repoUrl" type="text" class="repo-input"
             placeholder="（選填）GitHub repo 網址，會 clone 進來一起討論" />
      <input id="requirement" type="text"
             placeholder="輸入產品需求，例如：做一個能計算 BMI 並分類的 Python CLI" />
      <button id="startBtn">開始討論</button>
      <button id="stopBtn" class="ghost" disabled>停止</button>
    </div>
    <nav class="toolbar">
      <button id="settingsBtn" class="ghost" title="設定">⚙️ 設定</button>
      <button id="historyBtn" class="ghost" title="歷史 session">📜 歷史</button>
      <button id="autopilotBtn" class="ghost" title="Autopilot 自主迴圈">🤖 Autopilot</button>
      <button id="logoutBtn" class="ghost hidden" title="登出">登出</button>
    </nav>
    <div id="phase" class="phase">待命中</div>
  </header>

  <!-- 設定（API key / provider / 模型 / GitHub token） -->
  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-head">
      <h2>設定</h2>
      <button id="settingsClose" class="ghost">✕</button>
    </div>
    <form id="settingsForm" class="settings-form"></form>

    <!-- 變更登入門禁密碼 -->
    <div class="settings-pw">
      <h3>存取密碼（登入門禁）</h3>
      <div id="pwStatus" class="muted"></div>
      <label class="set-row" id="pwCurrentRow">
        <span class="set-label">目前密碼</span>
        <input id="pwCurrent" type="password" placeholder="輸入目前密碼" autocomplete="current-password" />
      </label>
      <label class="set-row">
        <span class="set-label">新密碼</span>
        <input id="pwNew" type="password" placeholder="至少 4 個字元" autocomplete="new-password" />
      </label>
      <label class="set-row">
        <span class="set-label">確認新密碼</span>
        <input id="pwConfirm" type="password" placeholder="再次輸入新密碼" autocomplete="new-password" />
      </label>
      <div class="pw-actions">
        <button id="pwSave" type="button">變更密碼</button>
        <span id="pwHint" class="muted"></span>
      </div>
    </div>

    <div class="settings-foot">
      <span id="settingsHint" class="muted">設定會寫入伺服器的 .env，下次討論即生效。</span>
      <button id="settingsSave">儲存</button>
    </div>
  </div>

  <!-- 歷史存檔 / 重播 -->
  <div id="historyPanel" class="history-panel hidden">
    <div class="history-head">
      <h2>歷史 session</h2>
      <div class="history-actions">
        <button id="historyCleanup" class="ghost danger" title="刪除所有已完成的 session（含產出檔案）">🗑️ 清除已完成</button>
        <button id="historyClose" class="ghost">✕</button>
      </div>
    </div>
    <ul id="historyList" class="history-list"></ul>
  </div>

  <!-- Autopilot 自主自我改善迴圈 -->
  <div id="autopilotPanel" class="history-panel hidden">
    <div class="history-head">
      <h2>🤖 Autopilot</h2>
      <button id="autopilotClose" class="ghost">✕</button>
    </div>
    <div class="ap-status">
      <span id="apState" class="muted">載入中…</span>
      <button id="apToggle" class="ghost">暫停 / 恢復</button>
    </div>
    <div class="ap-add">
      <input id="apTaskTitle" type="text" placeholder="新增一個自我改善任務（標題）" />
      <button id="apAddBtn">加任務</button>
    </div>
    <ul id="apBacklog" class="history-list"></ul>
  </div>

  <main class="layout">
    <!-- 左：專家名單 -->
    <aside class="experts" id="experts">
      <h2>工作室成員</h2>
      <div id="expertList"></div>
    </aside>

    <!-- 中：討論串 -->
    <section class="discussion">
      <h2>即時討論</h2>
      <div id="stream" class="stream">
        <div class="placeholder">輸入需求並按「開始討論」，專家們就會開工。</div>
      </div>
      <div class="interject">
        <input id="interjectInput" type="text"
               placeholder="想插話？在這裡輸入指示，專家會在下一步納入考量…" disabled />
        <button id="interjectBtn" disabled>插話</button>
      </div>
    </section>

    <!-- 右：看板 + 檔案 -->
    <aside class="side">
      <div class="board">
        <h2>看板</h2>
        <div class="columns">
          <div class="col" data-col="todo"><h3>待辦</h3><div class="cards"></div></div>
          <div class="col" data-col="doing"><h3>進行中</h3><div class="cards"></div></div>
          <div class="col" data-col="review"><h3>審查</h3><div class="cards"></div></div>
          <div class="col" data-col="done"><h3>完成</h3><div class="cards"></div></div>
        </div>
      </div>
      <div class="files">
        <h2>產出檔案 <button id="downloadBtn" class="download-btn hidden" title="把目前 session 的產出打包下載">⬇️ 下載成果</button></h2>
        <div class="filewrap">
          <ul id="fileList" class="filelist"></ul>
          <pre id="fileView" class="fileview">（點選左側檔案檢視內容）</pre>
        </div>
      </div>
    </aside>
  </main>

  <div id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
